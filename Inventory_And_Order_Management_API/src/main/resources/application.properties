
spring.application.name=Inventory_And_Order_Management_API
server.port=8088

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/ShopingCart_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=your-username
spring.datasource.password=your-password

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING (OPTIONAL)
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=mysupersecretkeymysupersecretkey123456
jwt.expiration=86400000